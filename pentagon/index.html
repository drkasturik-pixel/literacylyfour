<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Sorting Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="splash">
    <img src="assets/innovine-logo.png">
</div>

<div id="game">

    <h1 id="instruction">
        Drag each object into the correct shape column
    </h1>

    <div id="scorePanel">
        Score: <span id="score">0</span>
    </div>

    <div id="feedback"></div>

    <div id="columns">

        <div class="column" data-shape="Pentagon">

            <img src="assets/pentagon.png" class="shapeImage">

            <h2>Pentagon</h2>

            <div class="dropZone"></div>

        </div>

        <div class="column" data-shape="Hexagon">

            <img src="assets/hexagon.png" class="shapeImage">

            <h2>Hexagon</h2>

            <div class="dropZone"></div>

        </div>

        <div class="column" data-shape="Octagon">

            <img src="assets/octagon.png" class="shapeImage">

            <h2>Octagon</h2>

            <div class="dropZone"></div>

        </div>

    </div>

    <div id="objectTray"></div>

</div>

<div id="finalScreen">

    <h1>🎉 Congratulations!</h1>

    <h2 id="finalScore"></h2>

    <button onclick="location.reload()">
        Play Again
    </button>

</div>

<audio id="bgMusic" src="assets/bgmusic.mp3" loop></audio>
<audio id="claps" src="assets/claps.mp3"></audio>
<audio id="buzzer" src="assets/buzzer.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
