<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Shapes Spinner Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Comic Sans MS,sans-serif;
}

body{
background:#dff4ff;
overflow:hidden;
height:100vh;
}

#splash{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:white;
z-index:9999;
}

#splash img{
width:300px;
max-width:80%;
}

#game{
display:none;
height:100vh;
padding:10px;
}

#instruction{
text-align:center;
font-size:22px;
font-weight:bold;
color:#004080;
margin-bottom:5px;
}

#score{
text-align:center;
font-size:20px;
margin-bottom:10px;
}

#spinnerArea{
text-align:center;
position:relative;
height:170px;
}

#wheel{
width:130px;
height:130px;
border-radius:50%;
border:8px solid #444;
margin:auto;
background:
conic-gradient(
#ffcc66 0 120deg,
#99dd99 120deg 240deg,
#88ccff 240deg 360deg
);
cursor:pointer;
transition:transform 4s ease-out;
}

#pointer{
font-size:40px;
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
}

#targetText{
font-size:24px;
margin-top:10px;
color:#cc0000;
font-weight:bold;
}

#playArea{
display:flex;
height:calc(100vh - 260px);
}

#shapes{
flex:2;
position:relative;
}

.shape{
position:absolute;
width:130px;
height:130px;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
color:#333;
background:white;
border:4px solid #333;
}

#hexagon{
top:0;
left:50%;
transform:translateX(-50%);
clip-path:polygon(
25% 0%,75% 0%,100% 50%,
75% 100%,25% 100%,0% 50%);
}

#pentagon{
left:20px;
top:50%;
transform:translateY(-50%);
clip-path:polygon(
50% 0%,100% 38%,82% 100%,
18% 100%,0% 38%);
}

#octagon{
bottom:0;
left:50%;
transform:translateX(-50%);
clip-path:polygon(
30% 0%,70% 0%,100% 30%,
100% 70%,70% 100%,30% 100%,
0% 70%,0% 30%);
}

#objects{
flex:1;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
align-content:start;
}

.card{
background:white;
padding:4px;
border-radius:12px;
text-align:center;
border:2px solid #ccc;
}

.card img{
width:60px;
height:60px;
object-fit:contain;
touch-action:none;
}

#feedback{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
font-size:40px;
font-weight:bold;
}

#replay{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 30px;
font-size:24px;
}

@media(max-width:900px){

.shape{
width:100px;
height:100px;
font-size:16px;
}

.card img{
width:50px;
height:50px;
}

#wheel{
width:100px;
height:100px;
}

}

</style>
</head>
<body>

<div id="splash">
<img src="assets/innovine-logo.png">
</div>

<div id="game">

<div id="instruction">
Spin the spinner and drag the correct object to the matching shape
</div>

<div id="score">
Score: <span id="scoreValue">0</span>
</div>

<div id="spinnerArea">

<div id="pointer">⬇️</div>

<div id="wheel"></div>

<div id="targetText">
Click Spinner
</div>

</div>

<div id="playArea">

<div id="shapes">

<div class="shape" id="hexagon">HEXAGON</div>

<div class="shape" id="pentagon">PENTAGON</div>

<div class="shape" id="octagon">OCTAGON</div>

</div>

<div id="objects"></div>

</div>

<div id="feedback"></div>

<button id="replay">
Play Again
</button>

</div>

<audio id="bgMusic" src="assets/bgmusic.mp3" loop></audio>
<audio id="claps" src="assets/claps.mp3"></audio>
<audio id="buzzer" src="assets/buzzer.mp3"></audio>

<script>

const shapeItems = {

Pentagon:[
"house.png",
"gift.png"
],

Hexagon:[
"honey.png",
"nut.png",
"tile.png",
"go.png",
"pencil.png"
],

Octagon:[
"stop.png",
"roadmarker.png",
"specs.png"
]

};

let score=0;
let currentShape="";

const wheel=document.getElementById("wheel");
const targetText=document.getElementById("targetText");
const scoreValue=document.getElementById("scoreValue");
const feedback=document.getElementById("feedback");

const allObjects=[
"house.png",
"gift.png",
"honey.png",
"nut.png",
"tile.png",
"go.png",
"pencil.png",
"stop.png",
"roadmarker.png",
"specs.png"
];

function createObjects(){

const container=document.getElementById("objects");
container.innerHTML="";

allObjects.forEach(item=>{

let div=document.createElement("div");
div.className="card";

let img=document.createElement("img");

img.src="assets/"+item;

img.draggable=true;
img.dataset.name=item;

img.addEventListener("dragstart",e=>{
e.dataTransfer.setData("text",item);
});

div.appendChild(img);
container.appendChild(div);

});

}

createObjects();

const shapes=["Pentagon","Hexagon","Octagon"];

wheel.onclick=()=>{

let shape=shapes[Math.floor(Math.random()*3)];

currentShape=shape;

let angle=Math.floor(Math.random()*360)+1440;

wheel.style.transform=`rotate(${angle}deg)`;

setTimeout(()=>{
targetText.innerHTML="Find a "+shape;
speak("Find a "+shape);
},4000);

};

function checkCorrect(item){

return shapeItems[currentShape].includes(item);

}

["pentagon","hexagon","octagon"].forEach(id=>{

let target=document.getElementById(id);

target.addEventListener("dragover",e=>{
e.preventDefault();
});

target.addEventListener("drop",e=>{

e.preventDefault();

let item=e.dataTransfer.getData("text");

let expected=id.charAt(0).toUpperCase()+id.slice(1);

if(expected!==currentShape){

wrong();
return;
}

if(checkCorrect(item)){

correct(item);

}
else{

wrong();

}

});

});

function correct(item){

feedback.innerHTML="✅ Great Job!";

document.getElementById("claps").play();

speak("Excellent");

score++;

scoreValue.textContent=score;

document.querySelectorAll("img").forEach(img=>{

if(img.dataset.name===item){

img.parentElement.remove();

}

});

setTimeout(()=>{

feedback.innerHTML="";

targetText.innerHTML="Spin Again";

},2000);

checkFinish();

}

function wrong(){

feedback.innerHTML="❌ Try Again";

document.getElementById("buzzer").play();

speak("Try Again");

}

function checkFinish(){

if(document.querySelectorAll("#objects img").length===0){

targetText.innerHTML=
"Congratulations! Score "+score+"/10";

document.getElementById("replay").style.display="block";

speak("Congratulations. You completed the game");

}

}

document.getElementById("replay").onclick=()=>{

location.reload();

};

function speak(text){

if('speechSynthesis' in window){

speechSynthesis.cancel();

let utter=new SpeechSynthesisUtterance(text);

utter.rate=0.9;

speechSynthesis.speak(utter);

}

}

window.onload=()=>{

setTimeout(()=>{

document.getElementById("splash").style.display="none";

document.getElementById("game").style.display="block";

let intro=
"Welcome. Spin the spinner. Drag the correct object to the matching shape.";

let speech=new SpeechSynthesisUtterance(intro);

speech.onend=()=>{

document.getElementById("bgMusic").volume=0.25;

document.getElementById("bgMusic").play();

};

speechSynthesis.speak(speech);

},5000);

};

</script>

</body>
</html>
